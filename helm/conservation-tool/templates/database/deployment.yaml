apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "conservation-tool.fullname.db" . }}
  labels:
    {{- include "conservation-tool.labels" . | nindent 4 }}
  annotations:
    template.alpha.openshift.io/wait-for-ready: 'true'
    {{- include "conservation-tool.annotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.db.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ include "conservation-tool.fullname.db" . | quote }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ include "conservation-tool.fullname.db" . | quote }}
        role: db
      annotations:
        conservation-tool/release-revision: {{ .Release.Revision | quote }}
    spec:
      # pod-level security context
      securityContext:
        runAsNonRoot: true
        {{- if .Values.services.db.securityContext.runAsUser }}
        runAsUser: {{ .Values.services.db.securityContext.runAsUser }}
        {{- end }}
        {{- if .Values.services.db.securityContext.fsGroup }}
        fsGroup: {{ .Values.services.db.securityContext.fsGroup }}
        {{- end }}
      containers:
        - name: postgresql
          image: "{{ .Values.registry }}/{{ .Values.services.db.image.stream }}:{{ .Values.services.db.image.tag }}"
          imagePullPolicy: {{ .Values.services.db.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            runAsNonRoot: true
            {{- if .Values.services.db.securityContext.runAsUser }}
            runAsUser: {{ .Values.services.db.securityContext.runAsUser }}
            {{- end }}
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_DATABASE
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_ADMIN
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_ADMIN_PASS
            - name: PGDATA
              value: '{{ .Values.database.pgData | default "/var/lib/postgresql/data" }}'
            - name: PGOPTIONS
              value: "-c maintenance_work_mem=128MB"
            - name: PGTZ
              value: '{{ .Values.database.timezone | default "UTC" }}'
          ports:
            - containerPort: {{ .Values.services.db.service.port | default 5432 }}
              protocol: TCP
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.services.db.service.port | default 5432 }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.db.resources | nindent 12 }}
          volumeMounts:
            - name: {{ include "conservation-tool.fullname.db" . }}-data
              mountPath: /var/lib/postgresql/data
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      volumes:
        - name: {{ include "conservation-tool.fullname.db" . }}-data
          persistentVolumeClaim:
            claimName: {{ .Values.database.persistence.existingClaim | default (include "conservation-tool.fullname.db" .) }}
