apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "conservation-tool.fullname.db-setup" . }}-{{ .Release.Revision }}
  namespace: {{ include "conservation-tool.namespace" . }}
  labels:
    {{- include "conservation-tool.labels" . | nindent 4 }}
    role: setup
  annotations:
    {{- include "conservation-tool.annotations" . | nindent 4 }}
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        {{- include "conservation-tool.labels" . | nindent 8 }}
        role: setup
    spec:
      initContainers:
        - name: wait-for-database
          image: "postgres:17-alpine"
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for database to be ready..."
              until pg_isready -h $DB_HOST -p $DB_PORT -U $DB_ADMIN; do
                echo "Database not ready, waiting..."
                sleep 5
              done
              echo "Database is ready!"
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_HOST
            - name: DB_PORT
              value: '{{ .Values.database.port | default "5432" }}'
            - name: DB_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_ADMIN
            - name: DB_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_ADMIN_PASS
            # What is this?? 
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  # key: database-admin-password
                  key: DB_ADMIN_PASS
      containers:
        - name: db-setup
          image: "{{ .Values.registry }}/{{ .Values.services.db-setup.image.stream }}:{{ .Values.services.db-setup.image.tag }}"
          imagePullPolicy: {{ .Values.services.dbSetup.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_HOST
            - name: DB_PORT
              value: '{{ .Values.database.port | default "5432" }}'
            - name: DB_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_ADMIN
            - name: DB_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_ADMIN_PASS
            - name: DB_USER_API
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_USER_API
            - name: DB_USER_API_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_USER_API_PASS
            - name: DB_USER_PREFECT
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_USER_PREFECT
            - name: DB_USER_PREFECT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_USER_PREFECT_PASS
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_DATABASE
            - name: DB_SCHEMA
              valueFrom:
                secretKeyRef:
                  name: {{ include "conservation-tool.fullname.db" . }}
                  key: DB_SCHEMA
            - name: CHANGE_VERSION
              value: "{{ .Values.environment.changeId | default "" }}"
            - name: NODE_ENV
              value: "{{ .Values.env.NODE_ENV | default "development" }}"
            - name: VERSION
              value: "{{ printf "%s-%s-%s" .Values.environment.name .Chart.AppVersion .Values.environment.changeId }}"
          resources:
            {{- toYaml .Values.services.dbSetup.resources | nindent 12 }}
      restartPolicy: Never
      dnsPolicy: ClusterFirst