apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "conservation-tool.fullname.dbSetup" . }}-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conservation-tool.labels" . | nindent 4 }}
    role: setup
  annotations:
    {{- include "conservation-tool.annotations" . | nindent 4 }}
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    # "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        {{- include "conservation-tool.labels" . | nindent 8 }}
        role: setup
    spec:
      securityContext:
        runAsNonRoot: true
        {{- if .Values.services.db.securityContext.runAsUser }}
        runAsUser: {{ .Values.services.db.securityContext.runAsUser }}
        {{- end }}
        {{- if .Values.services.db.securityContext.fsGroup }}
        fsGroup: {{ .Values.services.db.securityContext.fsGroup }}
        {{- end }}
      containers:
        - name: db-setup
          image: "{{ .Values.registry }}/{{ .Values.services.dbSetup.image.stream }}:{{ .Values.services.dbSetup.image.tag }}"
          imagePullPolicy: {{ .Values.services.dbSetup.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            runAsNonRoot: true
            {{- if .Values.services.db.securityContext.runAsUser }}
            runAsUser: {{ .Values.services.db.securityContext.runAsUser }}
            {{- end }}
          env:
            - name: DB_HOST
              value: {{ include "conservation-tool.fullname.db" . | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_ADMIN
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_ADMIN
            - name: DB_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_ADMIN_PASS
            - name: DB_USER_API
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_USER_API
            - name: DB_USER_API_PASS
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_USER_API_PASS
            - name: DB_USER_PREFECT
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_USER_PREFECT
            - name: DB_USER_PREFECT_PASS
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_USER_PREFECT_PASS
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_DATABASE
            - name: DB_SCHEMA
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-db
                  key: DB_SCHEMA
            - name: CHANGE_VERSION
              value: '{{ .Values.environment.changeId | default "" }}'
            - name: NODE_ENV
              value: '{{ .Values.env.NODE_ENV | default "development" }}'
            - name: VERSION
              value: '{{ printf "%s-%s-%s" .Values.environment.name .Chart.AppVersion .Values.environment.changeId }}'
          resources:
            {{- toYaml .Values.services.dbSetup.resources | nindent 12 }}
      restartPolicy: Never
      dnsPolicy: ClusterFirst
