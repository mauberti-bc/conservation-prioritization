apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "conservation-tool.fullname.prefect-worker" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conservation-tool.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.workflows.worker.replicas }}
  selector:
    matchLabels:
      app: {{ include "conservation-tool.fullname.prefect-worker" . }}
  template:
    metadata:
      labels:
        app: {{ include "conservation-tool.fullname.prefect-worker" . }}
      annotations:
        conservation-tool/release-revision: {{ .Release.Revision | quote }}
    spec:
      serviceAccountName: deployer
      initContainer:
        - name: wait-for-db-migrations
          image: "{{ .Values.registry }}/{{ .Values.services.workflows.worker.image.stream }}:{{ .Values.services.workflows.worker.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for DB migrations to complete..."
              until psql "host=$DB_HOST port=$DB_PORT dbname=$DB_DATABASE user=$DB_USER_PREFECT" \
                -c "select 1 where exists (select 1 from information_schema.tables where table_schema='public' and table_name='migration_lock') and exists (select 1 from migration_lock where is_locked=0);" \
                | grep -q 1; do
                echo "Migrations still running, waiting..."
                sleep 5
              done
              echo "Migrations complete, starting worker."

      containers:
        - name: prefect-worker
          image: "{{ .Values.registry }}/{{ .Values.services.workflows.worker.image.stream }}:{{ .Values.services.workflows.worker.image.tag }}"
          imagePullPolicy: {{ .Values.services.workflows.worker.image.pullPolicy | default "IfNotPresent" }}
          args:
            - prefect
            - worker
            - start
            - --pool
            - "{{ .Values.services.workflows.worker.pool }}"
          ports:
            - containerPort: {{ .Values.ports.prefect_worker_api | default 4202 }}
          env:
            - name: PREFECT_API_URL
              value: "{{ .Values.env.PREFECT_API_URL }}"
            - name: ZARR_STORE_PATH
              value: "{{ .Values.env.ZARR_STORE_PATH }}"
            - name: CONSERVATION_API_URL
              value: "{{ .Values.env.CONSERVATION_API_URL }}"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-api
                  key: INTERNAL_API_KEY
            - name: OBJECT_STORE_URL
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-object-storage
                  key: OBJECT_STORE_URL
            - name: OBJECT_STORE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-object-storage
                  key: OBJECT_STORE_ACCESS_KEY_ID
            - name: OBJECT_STORE_SECRET_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-object-storage
                  key: OBJECT_STORE_SECRET_KEY_ID
            - name: OBJECT_STORE_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-object-storage
                  key: OBJECT_STORE_BUCKET_NAME
            - name: S3_KEY_PREFIX
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-object-storage
                  key: S3_KEY_PREFIX
          resources:
            {{- toYaml .Values.services.workflows.worker.resources | nindent 12 }}
