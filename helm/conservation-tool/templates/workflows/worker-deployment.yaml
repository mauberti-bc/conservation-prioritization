apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "conservation-tool.fullname.prefect-worker" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "conservation-tool.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.workflows.worker.replicas }}
  selector:
    matchLabels:
      app: {{ include "conservation-tool.fullname.prefect-worker" . }}
  template:
    metadata:
      labels:
        app: {{ include "conservation-tool.fullname.prefect-worker" . }}
      annotations:
        conservation-tool/release-revision: {{ .Release.Revision | quote }}
    spec:
      serviceAccountName: deployer
      containers:
        - name: prefect-worker
          image: "{{ .Values.registry }}/{{ .Values.services.workflows.worker.image.stream }}:{{ .Values.services.workflows.worker.image.tag }}"
          imagePullPolicy: {{ .Values.services.workflows.worker.image.pullPolicy | default "Always" }}
          args:
            - prefect
            - worker
            - start
            - --pool
            - "{{ .Values.services.workflows.worker.pool }}"
          ports:
            - containerPort: {{ .Values.ports.prefect_worker_api | default 4202 }}
          env:
            - name: HOME
              value: "/home/app"
            - name: PREFECT_HOME
              value: "/tmp/.prefect"
            - name: PREFECT_API_URL
              value: "{{ .Values.env.PREFECT_API_URL }}"
            - name: ZARR_STORE_PATH
              value: "{{ .Values.env.ZARR_STORE_PATH }}"
            - name: CONSERVATION_API_URL
              value: "{{ .Values.env.CONSERVATION_API_URL }}"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-api
                  key: INTERNAL_API_KEY
            - name: OBJECT_STORE_URL
              value: {{ .Values.env.OBJECT_STORE_PUBLIC_ENDPOINT | default .Values.env.OBJECT_STORE_URL | quote }}
            - name: OBJECT_STORE_ENDPOINT
              value: {{ .Values.env.OBJECT_STORE_PUBLIC_ENDPOINT | default .Values.env.OBJECT_STORE_ENDPOINT | quote }}
            - name: OBJECT_STORE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-object-storage
                  key: OBJECT_STORE_ACCESS_KEY_ID
            - name: OBJECT_STORE_SECRET_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-object-storage
                  key: OBJECT_STORE_SECRET_KEY_ID
            - name: OBJECT_STORE_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-object-storage
                  key: OBJECT_STORE_BUCKET_NAME
            - name: SOURCE_OBJECT_STORE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-source-object-storage
                  key: SOURCE_OBJECT_STORE_ENDPOINT
            - name: SOURCE_OBJECT_STORE_URL
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-source-object-storage
                  key: SOURCE_OBJECT_STORE_URL
            - name: SOURCE_OBJECT_STORE_REGION
              value: {{ .Values.env.SOURCE_OBJECT_STORE_REGION | default .Values.env.OBJECT_STORE_REGION | quote }}
            - name: SOURCE_OBJECT_STORE_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-source-object-storage
                  key: SOURCE_OBJECT_STORE_BUCKET_NAME
            - name: SOURCE_BC_BOUNDARY_PATH
              value: {{ .Values.env.SOURCE_BC_BOUNDARY_PATH | default "" | quote }}
            - name: SOURCE_OBJECT_STORE_FORCE_PATH_STYLE
              value: {{ .Values.env.SOURCE_OBJECT_STORE_FORCE_PATH_STYLE | default .Values.env.OBJECT_STORE_FORCE_PATH_STYLE | default "true" | quote }}
            - name: SOURCE_OBJECT_STORE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-source-object-storage
                  key: SOURCE_OBJECT_STORE_ACCESS_KEY_ID
            - name: SOURCE_OBJECT_STORE_SECRET_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: conservation-tool-source-object-storage
                  key: SOURCE_OBJECT_STORE_SECRET_KEY_ID
          resources:
            {{- toYaml .Values.services.workflows.worker.resources | nindent 12 }}
