# ========================
# Global Configuration
# ========================
autoscaling:
  enabled: false
  maxReplicas: 1
  minReplicas: 1

gitRepo: "https://github.com/mauberti-bc/conservation-prioritization.git"
gitRef: "main"
registry: "image-registry.apps.gold.devops.gov.bc.ca/fa9440-tools"
objectStorageUrl: "https://nrs.objectstore.gov.bc.ca:443/"

environment:
  id: "dev"
  name: "dev"
  ts: "20260112-01"
  licensePlate: "fa9440"
  changeId: "001"

# ========================
# Ports Configuration
# ========================
ports:
  frontend: 7070
  api: 5200
  prefect_server_api: 4200
  prefect_worker_api: 8081
  db: 5432

# ========================
# Database Configuration (Structured for Helm templates)
# ========================
database:
  port: 5432
  userApi: ""  # Set via --set by workflow
  userApiPassword: ""  # Set via --set by workflow
  userPrefect: ""  # Set via --set by workflow
  userPrefectPassword: ""  # Set via --set by workflow
  admin: ""  # Set via --set by workflow - - do we need to pull this from openshift secrets?
  adminPassword: ""  # Set via --set by workflow - do we need to pull this from openshift secrets? 
  schema: "public"
  pgData: "/var/lib/postgresql/data/pgdata"
  timezone: "UTC"
  postgresql:
    primary:
      podSecurityContext:
        runAsUser: 1003600000
        fsGroup: 1003600000
      containerSecurityContext:
        runAsUser: 1003600000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 0.5Gi
    existingClaim: ""

# ========================
# Object Storage Configuration (Structured for Helm templates)
# ========================
objectStorage:
  url: ""  # Set via --set by workflow
  accessKeyId: ""  # Set via --set by workflow
  secretKeyId: ""  # Set via --set by workflow
  bucketName: ""  # Set via --set by workflow
  keyPrefix: ""  # Set via --set by workflow

# ========================
# Keycloak Configuration (Structured for Helm templates)
# ========================
keycloak:
  host: ""  # Set via --set by workflow
  realm: ""  # Set via --set by workflow
  adminUsername: ""  # Set via --set by workflow
  adminPassword: ""  # Set via --set by workflow
  apiTokenUrl: ""  # Set via --set by workflow
  apiClientId: ""  # Set via --set by workflow
  apiClientSecret: ""  # Set via --set by workflow
  apiHost: ""  # Set via --set by workflow
  apiEnvironment: ""  # Set via --set by workflow

# ========================
# Prefect Server & Workers
# ========================
prefect-server:
  postgresql:
    enabled: false
  secret:
    create: false
    name: conservation-tool-prefect-db

  serviceAccount:
    # why not create a service account? if we're not creating one, why name it? 
    create: false
    name: "prefect-server"

  ui:
    enabled: true
    podSecurityContext:
      runAsUser: 1003600000
      fsGroup: null
    containerSecurityContext:
      runAsUser: 1003600000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 50m
        memory: 128Mi
    env:
      - name: PREFECT_HOME
        value: /tmp/prefect
    extraVolumes:
      - name: prefect-tmp
        emptyDir: {}
    extraVolumeMounts:
      - name: prefect-tmp
        mountPath: /tmp/prefect

  server:
    # for dev 
    debug: true
    loggingLevel: DEBUG
    podSecurityContext:
      runAsUser: 1003600000
      fsGroup: null
    containerSecurityContext:
      runAsUser: 1003600000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 100m
        memory: 512Mi
    env:
      - name: PREFECT_HOME
        value: /tmp/prefect
      - name: PREFECT_API_DATABASE_CONNECTION_URL
        valueFrom:
          secretKeyRef:
            name: conservation-tool-prefect-db
            key: PREFECT_API_DATABASE_CONNECTION_URL
    extraVolumes:
      - name: prefect-tmp
        emptyDir: {}
    extraVolumeMounts:
      - name: prefect-tmp
        mountPath: /tmp/prefect

  migrations:
    enabled: true
    backoffLimit: 4
    env:
      - name: PREFECT_API_DATABASE_CONNECTION_URL
        valueFrom:
          secretKeyRef:
            name: conservation-tool-prefect-db
            key: PREFECT_API_DATABASE_CONNECTION_URL
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    securityContext:
      runAsUser: 1003600000
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities: {}
    extraVolumes:
    - name: prefect-tmp
      emptyDir: {}
    extraVolumeMounts:
      - name: prefect-tmp
        mountPath: /tmp/prefect

  ingress:
    enabled: false
    host:
      hostname: ""
      path: "/"
    className: "openshift-default"

prefect-worker:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 100m
      memory: 1024Mi
  replicas: 1
  pool: pool
  securityContext:
    runAsUser: 1003600000
  env:
    - name: PREFECT_HOME
      value: /tmp/prefect
  extraVolumes:
    - name: prefect-tmp
      emptyDir: {}
  extraVolumeMounts:
    - name: prefect-tmp
      mountPath: /tmp/prefect

prefect-deploy:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 100m
      memory: 256Mi
  replicas: 0
  securityContext:
    runAsUser: 1003600000
  env:
    - name: PREFECT_HOME
      value: /tmp/prefect  
  extraVolumes:
    - name: prefect-tmp
      emptyDir: {}
  extraVolumeMounts:
    - name: prefect-tmp
      mountPath: /tmp/prefect


# ========================
# Services Configuration
# ========================
services:
  frontend:
    replicas: 1
    image:
      stream: "frontend"
      tag: "dev"
      pullPolicy: "Always"
    config:
      port: 7100
      image:
        stream: "frontend-config"
        tag: "dev"
        pullPolicy: "Always"
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 64Mi
      env: []
    service:
      type: ClusterIP
      port: 7070
      targetPort: 7070
    route:
      host: ""
    securityContext:
      runAsUser: 1003600000
      fsGroup: 1003600000
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 100m
        memory: 256Mi
    livenessProbe:
      enabled: false
      path: "/health"
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      enabled: false
      path: "/health"
      initialDelaySeconds: 5
      periodSeconds: 5
    extraVolumeMounts: []
    extraVolumes: []

  workflows:
    worker:
      replicas: 0
      pool: pool
      image:
        stream: "prefect-worker"
        tag: "dev"
        pullPolicy: "Always"
      resources:
        limits:
          cpu: 100m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 512Mi
      service:
        type: ClusterIP
        port: 80
        targetPort: 8081
      securityContext:
        runAsUser: 1003600000

    deploy:
      replicas: 0
      image:
        stream: "prefect-deploy"
        tag: "dev"
        pullPolicy: "Always"
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          cpu: 100m
          # memory: 1024Mi
          memory: 512Mi
      securityContext:
        runAsUser: 1003600000

  api:
    replicas: 1
    image:
      stream: "api"
      tag: "dev"
      pullPolicy: "Always"
    service:
      type: ClusterIP
      port: 5200
      targetPort: 5200
    route:
      host: ""
    securityContext:
      runAsUser: 1003600000
      fsGroup: 1003600000
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 128Mi

  db:
    image:
      stream: "database"
      tag: "dev"
    service:
      type: ClusterIP
      port: 5432
      targetPort: 5432
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 100m
        memory: 512Mi
    securityContext:
      runAsUser: 1003600000
      fsGroup: 1003600000
    persistence:
      enabled: true
      size: 0.5Gi
      accessMode: ReadWriteOnce

  dbSetup:
    image:
      stream: "db-setup"
      tag: "dev"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# ========================
# Background Services
# ========================
backgroundServices:
  podSecurityContext:
    runAsUser: 1003600000
    fsGroup: 1003600000
  containerSecurityContext:
    runAsUser: 1003600000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# ========================
# Global Environment Variables (Flat structure for runtime injection)
# ========================
env:
  # Node / General
  NODE_ENV: "development"
  NODE_OPTIONS: "--max-old-space-size=4096"
  ZARR_STORE_PATH: "/data/output_1000.zarr"

  # Database
  DB_POOL_SIZE: "10"
  DB_CONNECTION_MAX_USES: "7200"
  DB_CONNECTION_TIMEOUT: "30000"
  DB_IDLE_TIMEOUT: "30000"

  # Prefect
  PREFECT_API_URL: "http://prefect-server:4200/api"
  PREFECT_SERVER_API_HOST: "0.0.0.0"
  PREFECT_UI_API_URL: "http://localhost:4200/api"
  PREFECT_API_DATABASE_CONNECTION_URL: ""  # Set via --set env.PREFECT_API_DATABASE_CONNECTION_URL by workflow
  PREFECT_API_KEY: ""  # Optional Prefect API key
  CONSERVATION_API_URL: "http://conservation-tool-api:5200/api"  # Base URL for internal workflow callbacks
  INTERNAL_API_KEY: ""  # Internal API token for workflow callbacks

  # Object Storage
  OBJECT_STORE_URL: ""  # Set via --set env.OBJECT_STORE_URL by workflow
  OBJECT_STORE_ACCESS_KEY_ID: ""  # Set via --set env.OBJECT_STORE_ACCESS_KEY_ID by workflow
  OBJECT_STORE_SECRET_KEY_ID: ""  # Set via --set env.OBJECT_STORE_SECRET_KEY_ID by workflow
  OBJECT_STORE_BUCKET_NAME: ""  # Set via --set env.OBJECT_STORE_BUCKET_NAME by workflow
  S3_KEY_PREFIX: ""  # Set via --set env.S3_KEY_PREFIX by workflow

  # Keycloak
  KEYCLOAK_HOST: ""  # Set via --set env.KEYCLOAK_HOST by workflow
  KEYCLOAK_REALM: ""  # Set via --set env.KEYCLOAK_REALM by workflow
  KEYCLOAK_ADMIN_USERNAME: ""  # Set via --set env.KEYCLOAK_ADMIN_USERNAME by workflow
  KEYCLOAK_ADMIN_PASSWORD: ""  # Set via --set env.KEYCLOAK_ADMIN_PASSWORD by workflow
  KEYCLOAK_API_TOKEN_URL: ""  # Set via --set env.KEYCLOAK_API_TOKEN_URL by workflow
  KEYCLOAK_API_CLIENT_ID: ""  # Set via --set env.KEYCLOAK_API_CLIENT_ID by workflow
  KEYCLOAK_API_CLIENT_SECRET: ""  # Set via --set env.KEYCLOAK_API_CLIENT_SECRET by workflow
  KEYCLOAK_API_HOST: ""  # Set via --set env.KEYCLOAK_API_HOST by workflow
  KEYCLOAK_API_ENVIRONMENT: ""  # Set via --set env.KEYCLOAK_API_ENVIRONMENT by workflow

  # API
  API_HOST: "0.0.0.0"
  API_PORT: "5200"
  APP_HOST: ""  # Set via --set env.APP_HOST by workflow (external hostname)
  FRONTEND_API_HOST: ""

  # Frontend
  VITE_PREFECT_API_URL: ""  # For local dev only (baked into image in production)
  VITE_ZARR_STORE_PATH: "/data/output_1000.zarr"
  VITE_APP_SITEMINDER_LOGOUT_URL: ""  # Set via --set env.VITE_APP_SITEMINDER_LOGOUT_URL by workflow (optional)
  VITE_APP_KEYCLOAK_HOST: ""  # Set via --set env.VITE_APP_KEYCLOAK_HOST by workflow (baked into image for prod)
  VITE_APP_KEYCLOAK_REALM: ""  # Set via --set env.VITE_APP_KEYCLOAK_REALM by workflow (baked into image for prod)
  VITE_APP_KEYCLOAK_CLIENT_ID: ""  # Set via --set env.VITE_APP_KEYCLOAK_CLIENT_ID by workflow (baked into image for prod)
