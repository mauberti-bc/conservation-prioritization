name: Build and Push Images to OpenShift Registry

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      source_tag:
        required: true
        type: string
      target_tag:
        required: true
        type: string
      environment:
        required: false
        type: string

permissions:
  contents: read

env:
  OPENSHIFT_SERVER: https://api.gold.devops.gov.bc.ca:6443
  IMAGE_REPOSITORY: conservation-tool
  IMAGE_REGISTRY: image-registry.apps.gold.devops.gov.bc.ca

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      workflows: ${{ steps.changes.outputs.workflows }}
      helm: ${{ steps.changes.outputs.helm }}
      force_build: ${{ steps.force-build.outputs.force_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for force build
        id: force-build
        run: |
          if [ "${{ vars.FORCE_BUILD }}" = "true" ]; then
            echo "force_build=true" >> $GITHUB_OUTPUT
            echo "🚀 FORCE_BUILD is enabled - will build all components"
          else
            echo "force_build=false" >> $GITHUB_OUTPUT
            echo "FORCE_BUILD is disabled - checking for changes"
          fi

      - name: Debug what changed
        run: |
          echo "Current commit: ${{ github.sha }}"
          echo "Previous commit: ${{ github.event.before }}"
          echo "Force build: ${{ steps.force-build.outputs.force_build }}"
          echo "Frontend changed: ${{ steps.changes.outputs.frontend }}"
          echo "Changed files:"
          git diff --name-only ${{ github.event.before }} ${{ github.sha }}

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'
            api:
              - 'api/**'
            workflows:
              - 'workflows/**'
            helm:
              - 'helm/**'

  build-push:
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.force_build == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.api == 'true' || needs.changes.outputs.workflows == 'true' }}
    environment: dev
    env:
      TOOLS_NAMESPACE: ${{ secrets.TOOLS_NAMESPACE }}
      TOOLS_SA_TOKEN: ${{ secrets.TOOLS_SA_TOKEN }}                  
      IMAGE_TAG: dev
      IMAGE_TAG_LATEST: latest
      GIT_SHA: ${{ github.sha }}
      NODE_ENV: ${{ vars.NODE_ENV }}
      NODE_OPTIONS: ${{ vars.NODE_OPTIONS }}
      PREFECT_API_URL: ${{ vars.PREFECT_API_URL }}
      ZARR_STORE_PATH: ${{ vars.ZARR_STORE_PATH }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.16"

      - name: Log in to OpenShift
        run: |
          for i in 1 2 3; do
            echo "Attempt $i: Logging into OpenShift..."
            if oc login --token=$TOOLS_SA_TOKEN --server=$OPENSHIFT_SERVER --insecure-skip-tls-verify=true; then
              echo "Login succeeded"
              break
            elif [ "$i" -lt 3 ]; then
              echo "Login failed. Retrying in 15 seconds..."
              sleep 15
            else
              echo "Login failed after 3 attempts."
              exit 1
            fi
          done

      - name: Log in to OpenShift internal registry
        run: |
          oc whoami -t | docker login $IMAGE_REGISTRY -u unused --password-stdin

      - name: Build and push frontend image
        working-directory: frontend
        if: ${{ needs.changes.outputs.force_build == 'true' || needs.changes.outputs.frontend == 'true' }}
        run: |
          # Check required env vars
          required_vars=(NODE_ENV NODE_OPTIONS PREFECT_API_URL ZARR_STORE_PATH)
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "Error: Environment variable $var is not set."
              exit 1
            fi
          done

          BASE_IMAGE="${IMAGE_REGISTRY}/${TOOLS_NAMESPACE}/frontend"
          docker build \
            --build-arg VITE_NODE_ENV="${NODE_ENV}" \
            --build-arg VITE_NODE_OPTIONS="${NODE_OPTIONS}" \
            --build-arg VITE_PREFECT_API_URL="${PREFECT_API_URL}" \
            --build-arg VITE_ZARR_STORE_PATH="${ZARR_STORE_PATH}" \
            -t ${BASE_IMAGE}:${IMAGE_TAG} \
            -t ${BASE_IMAGE}:${IMAGE_TAG_LATEST} \
            -t ${BASE_IMAGE}:${GIT_SHA} \
            -f ./Dockerfile .

          docker push ${BASE_IMAGE}:${IMAGE_TAG}
          docker push ${BASE_IMAGE}:${IMAGE_TAG_LATEST}
          docker push ${BASE_IMAGE}:${GIT_SHA}

      - name: Build and push API image
        working-directory: api
        if: ${{ needs.changes.outputs.force_build == 'true' || needs.changes.outputs.api == 'true' }}
        run: |
          BASE_IMAGE="${IMAGE_REGISTRY}/${TOOLS_NAMESPACE}/api"
          docker build -t ${BASE_IMAGE}:${IMAGE_TAG} -t ${BASE_IMAGE}:${IMAGE_TAG_LATEST} -t ${BASE_IMAGE}:${GIT_SHA} -f ./Dockerfile .
          docker push ${BASE_IMAGE}:${IMAGE_TAG}
          docker push ${BASE_IMAGE}:${IMAGE_TAG_LATEST}
          docker push ${BASE_IMAGE}:${GIT_SHA}

      - name: Build and push Prefect worker image
        working-directory: workflows
        if: ${{ needs.changes.outputs.force_build == 'true' || needs.changes.outputs.workflows == 'true' }}
        run: |
          BASE_IMAGE="${IMAGE_REGISTRY}/${TOOLS_NAMESPACE}/prefect-worker"
          docker build -t ${BASE_IMAGE}:${IMAGE_TAG} -t ${BASE_IMAGE}:${IMAGE_TAG_LATEST} -t ${BASE_IMAGE}:${GIT_SHA} -f ./Dockerfile.worker .
          docker push ${BASE_IMAGE}:${IMAGE_TAG}
          docker push ${BASE_IMAGE}:${IMAGE_TAG_LATEST}
          docker push ${BASE_IMAGE}:${GIT_SHA}

      - name: Build and push Prefect deploy image
        working-directory: workflows
        if: ${{ needs.changes.outputs.force_build == 'true' || needs.changes.outputs.workflows == 'true' }}
        run: |
          BASE_IMAGE="${IMAGE_REGISTRY}/${TOOLS_NAMESPACE}/prefect-deploy"
          docker build -t ${BASE_IMAGE}:${IMAGE_TAG} -t ${BASE_IMAGE}:${IMAGE_TAG_LATEST} -t ${BASE_IMAGE}:${GIT_SHA} -f ./Dockerfile.deploy .
          docker push ${BASE_IMAGE}:${IMAGE_TAG}
          docker push ${BASE_IMAGE}:${IMAGE_TAG_LATEST}
          docker push ${BASE_IMAGE}:${GIT_SHA}

      - name: Build and push Database image
        working-directory: database
        if: ${{ needs.changes.outputs.force_build == 'true' || needs.changes.outputs.database == 'true' }}
        run: |
          BASE_IMAGE="${IMAGE_REGISTRY}/${TOOLS_NAMESPACE}/database"
          docker build -t ${BASE_IMAGE}:${IMAGE_TAG} -t ${BASE_IMAGE}:${IMAGE_TAG_LATEST} -t ${BASE_IMAGE}:${GIT_SHA} -f ./Dockerfile .
          docker push ${BASE_IMAGE}:${IMAGE_TAG}
          docker push ${BASE_IMAGE}:${IMAGE_TAG_LATEST}
          docker push ${BASE_IMAGE}:${GIT_SHA}

      - name: Build and push db-setup image
        working-directory: database
        if: ${{ needs.changes.outputs.force_build == 'true' || needs.changes.outputs.db-setup == 'true' }}
        run: |
          BASE_IMAGE="${IMAGE_REGISTRY}/${TOOLS_NAMESPACE}/db-setup"
          docker build -t ${BASE_IMAGE}:${IMAGE_TAG} -t ${BASE_IMAGE}:${IMAGE_TAG_LATEST} -t ${BASE_IMAGE}:${GIT_SHA} -f .docker/db/Dockerfile.setup .
          docker push ${BASE_IMAGE}:${IMAGE_TAG}
          docker push ${BASE_IMAGE}:${IMAGE_TAG_LATEST}
          docker push ${BASE_IMAGE}:${GIT_SHA}

  install-helm:
    runs-on: ubuntu-latest
    needs: [build-push]
    if: ${{ needs.build-push.result == 'success' }}
    environment: dev
    env:
      OPENSHIFT_NAMESPACE: ${{ secrets.OPENSHIFT_NAMESPACE }}
      OPENSHIFT_SERVER: https://api.gold.devops.gov.bc.ca:6443
      SA_TOKEN: ${{ secrets.SA_TOKEN }}
      VALUES_FILE: values-dev.yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4.16"

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Log in to OpenShift
        run: |
          oc login --token=$SA_TOKEN --server=$OPENSHIFT_SERVER --insecure-skip-tls-verify=true
          oc project $OPENSHIFT_NAMESPACE

      - name: Validate required OpenShift secrets
        run: |
          check_secret_key() {
            local secret_name="$1"
            local key_name="$2"
            local value

            value="$(oc get secret "${secret_name}" -n "${OPENSHIFT_NAMESPACE}" -o "jsonpath={.data.${key_name}}" 2>/dev/null || true)"
            if [ -z "${value}" ]; then
              echo "Missing secret/key: ${secret_name}.${key_name}"
              exit 1
            fi
          }

          check_secret_decoded_prefix() {
            local secret_name="$1"
            local key_name="$2"
            local required_prefix="$3"
            local encoded_value
            local decoded_value

            encoded_value="$(oc get secret "${secret_name}" -n "${OPENSHIFT_NAMESPACE}" -o "jsonpath={.data.${key_name}}" 2>/dev/null || true)"
            if [ -z "${encoded_value}" ]; then
              echo "Missing secret/key: ${secret_name}.${key_name}"
              exit 1
            fi

            decoded_value="$(printf '%s' "${encoded_value}" | base64 -d 2>/dev/null || true)"
            if [ -z "${decoded_value}" ]; then
              echo "Secret/key is not valid base64 or decodes empty: ${secret_name}.${key_name}"
              exit 1
            fi

            if [[ "${decoded_value}" != ${required_prefix}* ]]; then
              echo "Secret/key has invalid format: ${secret_name}.${key_name}. Expected prefix: ${required_prefix}"
              exit 1
            fi
          }

          check_secret_key "conservation-tool-db" "DB_HOST"
          check_secret_key "conservation-tool-db" "DB_PORT"
          check_secret_key "conservation-tool-db" "DB_DATABASE"
          check_secret_key "conservation-tool-db" "DB_SCHEMA"
          check_secret_key "conservation-tool-db" "DB_USER_API"
          check_secret_key "conservation-tool-db" "DB_USER_API_PASS"
          check_secret_key "conservation-tool-db" "DB_USER_PREFECT"
          check_secret_key "conservation-tool-db" "DB_USER_PREFECT_PASS"
          check_secret_key "conservation-tool-db" "DB_ADMIN"
          check_secret_key "conservation-tool-db" "DB_ADMIN_PASS"

          check_secret_key "conservation-tool-prefect-db" "PREFECT_API_DATABASE_CONNECTION_URL"
          check_secret_decoded_prefix "conservation-tool-prefect-db" "PREFECT_API_DATABASE_CONNECTION_URL" "postgresql+asyncpg://"

          check_secret_key "conservation-tool-object-storage" "OBJECT_STORE_URL"
          check_secret_key "conservation-tool-object-storage" "OBJECT_STORE_ACCESS_KEY_ID"
          check_secret_key "conservation-tool-object-storage" "OBJECT_STORE_SECRET_KEY_ID"
          check_secret_key "conservation-tool-object-storage" "OBJECT_STORE_BUCKET_NAME"
          check_secret_key "conservation-tool-object-storage" "S3_KEY_PREFIX"

          check_secret_key "conservation-tool-api" "INTERNAL_API_KEY"

          check_secret_key "conservation-tool-keycloak" "KEYCLOAK_HOST"
          check_secret_key "conservation-tool-keycloak" "KEYCLOAK_REALM"
          check_secret_key "conservation-tool-keycloak" "KEYCLOAK_ADMIN_USERNAME"
          check_secret_key "conservation-tool-keycloak" "KEYCLOAK_ADMIN_PASSWORD"
          check_secret_key "conservation-tool-keycloak" "KEYCLOAK_API_TOKEN_URL"
          check_secret_key "conservation-tool-keycloak" "KEYCLOAK_API_CLIENT_ID"
          check_secret_key "conservation-tool-keycloak" "KEYCLOAK_API_CLIENT_SECRET"
          check_secret_key "conservation-tool-keycloak" "KEYCLOAK_API_HOST"
          check_secret_key "conservation-tool-keycloak" "KEYCLOAK_API_ENVIRONMENT"

      - name: Build Helm dependencies
        working-directory: helm/conservation-tool
        run: |
          echo "Adding required Helm repos..."
          helm repo add prefecthq https://prefecthq.github.io/prefect-helm
          helm repo update

          echo "Building Helm dependencies..."
          helm dependency build

      - name: Deploy via Helm
        working-directory: helm/conservation-tool
        run: |
          helm upgrade --install conservation-tool . \
            --values values.yaml \
            --values ${VALUES_FILE} \
            --namespace ${OPENSHIFT_NAMESPACE} \
            --wait \
            --timeout=10m \
            --atomic

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          oc get deployments -n ${OPENSHIFT_NAMESPACE}
          oc get pods -n ${OPENSHIFT_NAMESPACE}
